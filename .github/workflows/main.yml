# Create the Angular app
npm install -g @angular/cli
ng new evry-to-formio --standalone --routing --style=scss
cd evry-to-formio

# Install dependencies
npm install xlsx pdfjs-dist mammoth tesseract.js file-saver

# Use Codex in this repo
npm i -g @openai/codex
codex

# After Codex has generated and refined the project
npm test
npm run build

# Publish to GitHub
# Option A: GitHub CLI
gh repo create evry-to-formio --public --source=. --remote=origin --push
